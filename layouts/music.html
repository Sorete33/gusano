{{ define "main" }}
  <!-- Using Material Icons for better visual appeal of controls -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="/css/music.css" />

  <div class="container music-container">
     <!-- Button to toggle playlist visibility -->
    <button id="togglePlaylist" class="playlist-btn"><span class="material-icons">menu</span>Playlist</button> 

    <div id="overlay" class="overlay"></div>

    <aside id="playlist">
      <div class="aside-header">
        <h3><span class="material-icons">queue_music</span> Recis</h3>
        <div class="aside-header-actions">
          <button id="toggleFiltersBtn" class="material-icons" title="Filtrar">filter_list</button>
          <!-- Close button for mobile -->
          <button id="closePlaylist" class="material-icons">close</button>
        </div>
      </div>
      
      <div class="playlist-filters hidden">
        <div class="filter-group">
          <label for="searchFilter">Buscar</label>
          <div class="search-input-container">
            <span class="material-icons search-icon">search</span>
            <input type="text" id="searchFilter" placeholder="Buscar recital, banda..." />
          </div>
        </div>
        <div class="filter-group">
          <label for="bandFilter">Bandas</label>
          <select id="bandFilter">
            <option value="">Todas las bandas</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Fecha</label>
          <div class="date-input-container">
            <div class="custom-date-picker">
              <button id="datePickerBtn" class="date-picker-btn" type="button">
                <span class="material-icons">calendar_today</span>
                <span id="datePickerLabel">Seleccionar fecha</span>
                <span class="material-icons">arrow_drop_down</span>
              </button>
              <div id="datePickerDropdown" class="date-picker-dropdown">
                <div class="cal-nav">
                  <button id="prevMonth" class="material-icons cal-nav-btn" type="button">chevron_left</button>
                  <span id="calTitle" class="cal-title"></span>
                  <button id="nextMonth" class="material-icons cal-nav-btn" type="button">chevron_right</button>
                </div>
                <div class="cal-day-names">
                  <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span>
                </div>
                <div id="calGrid" class="cal-grid"></div>
              </div>
            </div>
            <input type="hidden" id="dateFilter" />
            <button id="clearDateBtn" class="clear-btn material-icons" title="Limpiar fecha">clear</button>
          </div>
        </div>
      </div>

      <ul id="songList"></ul>
    </aside>
    
    <div class="music-main">
      <div class="thumbnail">
        <!-- Album art image. 'default.jpg' should be in the 'images' folder. -->
        <img id="albumArt" src="/covers" alt="Album Art" />
      </div>

      <div class="info">
        <h2 id="title"></h2>
        <p id="artist"></p>
      </div>

      <div class="progress-container">
        <span id="currentTime">0:00</span>
        <!-- Progress bar for the song -->
        <input type="range" id="progress" value="0" min="0" max="100" step="0.1" />
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <!-- Shuffle button -->
        <button id="shuffleBtn" class="material-icons">shuffle</button>
        <!-- Previous song button -->
        <button id="prev" class="material-icons">skip_previous</button>
        <!-- Play/Pause button -->
        <button id="playPause" class="material-icons">play_arrow</button>
        <!-- Next song button -->
        <button id="next" class="material-icons">skip_next</button>
        <!-- Repeat mode button (cycles through none, one, all) -->
        <button id="repeatBtn" class="material-icons">repeat</button>
      </div>

      <div class="volume-container">
        <!-- Volume icon -->
        <span class="material-icons">volume_up</span>
        <!-- Volume slider -->
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>
  </div>

  <!-- Inject Hugo recital data to window.recitalData -->
  <script>
    window.recitalData = [
      {{ range (where .Site.RegularPages "Section" "recitales") }}
        {
          permalink: "{{ .RelPermalink }}",
          date: "{{ .Date.Format "2006-01-02" }}",
          title: "{{ .Title | safeJS }}",
          bandas: [
            {{ range .Params.bandas }}
              "{{ . | safeJS }}",
            {{ end }}
          ],
          audios: [
            {{ $matches := findRE `(https?://|/audio/)[a-zA-Z0-9./_-]+\.mp3` .RawContent }}
            {{ range $matches }}
              "{{ . }}",
            {{ end }}
          ]
        },
      {{ end }}
    ];
  </script>

  <!-- Link to the JavaScript file -->
  <script src="/js/music.js"></script>
{{ end }}
