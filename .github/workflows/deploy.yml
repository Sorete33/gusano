name: Sync Dropbox and Deploy
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# REQUIRED: Gives the bot permission to update your flyers.yml
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Fetches all history so the push doesn't fail
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install dropbox PyYAML

      - name: Run Dropbox Sync
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: python sync_dropbox.py

      # --- THIS IS THE MISSING STEP ---
      - name: Commit and Push changes back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flyers.yml static/images/gallery/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated Sync: Update flyers from Dropbox"
            git push origin master
          else
            echo "No changes detected in Dropbox sync."
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: |
          rm -rf public
          hugo --minify --gc --cleanDestinationDir --ignoreCache

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          api_token: ${{ secrets.NEOCITIES_API_KEY }}
          dist_dir: public
          cleanup: false
          # This forces Neocities to overwrite every file regardless of timestamps
          force: true
