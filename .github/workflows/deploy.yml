name: Sync Dropbox and Deploy
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# REQUIRED: Gives the bot permission to update your flyers.yml
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install dropbox PyYAML

      - name: Run Dropbox Sync
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: python sync_dropbox.py

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build Hugo
        run: |
          # We build FIRST while the new Dropbox files are present in the local runner
          hugo --minify --gc --cleanDestinationDir
          ls -R public/flyers || echo "Flyers directory not found!"

      - name: Deploy to Neocities
        uses: bcomnes/deploy-to-neocities@v1
        with:
          api_token: ${{ secrets.NEOCITIES_API_KEY }}
          dist_dir: public
          cleanup: false

      # Commit the changes LAST so the deployment isn't delayed by Git operations
      - name: Commit and Push changes back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add everything that changed (data, static, and potential Hugo config changes)
          # We don't worry about 'public' because we ignored it in Step 1
          git add . 
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Automated Sync: Update flyers from Dropbox"
            # Use --force-with-lease to avoid conflicts if you happen to push locally at the same time
            git push origin HEAD:master
          else
            echo "No changes detected."
          fi